name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-northeast1
  SERVICE_NAME: sumo-traffic-agent

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t $SERVICE_NAME .

      - name: Verify container starts
        run: |
          docker run -d --name test-container \
            -e SUMO_SERVER_SKIP_VENV_REEXEC=1 \
            -p 8080:8080 \
            $SERVICE_NAME
          sleep 5
          curl -f http://localhost:8080/api/status || (docker logs test-container && exit 1)
          docker stop test-container

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev

      - name: Build and push image
        run: |
          IMAGE=${REGION}-docker.pkg.dev/${PROJECT_ID}/docker-repo/${SERVICE_NAME}:${GITHUB_SHA::7}
          docker build --no-cache -t $IMAGE .
          docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          IMAGE=${REGION}-docker.pkg.dev/${PROJECT_ID}/docker-repo/${SERVICE_NAME}:${GITHUB_SHA::7}
          BUCKET=${PROJECT_ID}-sumo-data
          gcloud run deploy $SERVICE_NAME \
            --image $IMAGE \
            --region $REGION \
            --platform managed \
            --execution-environment gen2 \
            --port 8080 \
            --memory 2Gi \
            --cpu 1 \
            --timeout 600 \
            --max-instances 3 \
            --set-env-vars "SUMO_SERVER_SKIP_VENV_REEXEC=1,BASE_LLM_SHARED_PROVIDER=gemini,GCS_DB_BUCKET=${BUCKET},SIM_WARMUP_SECONDS=120" \
            --set-secrets "OPENAI_API_KEY=openai-api-key:latest,TOPIS_API_KEY=topis-api-key:latest,OPENAI_FT_MODEL=openai-ft-model:latest,GEMINI_API_KEY=gemini-api-key:latest,BASE_LLM_SHARED_KEY=gemini-api-key:latest" \
            --allow-unauthenticated
